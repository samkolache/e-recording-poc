<div class="card rule-validation-card">
  <!-- Card Header: design system component with Bootstrap utilities + custom padding -->
  <div class="card-header d-flex align-items-center justify-content-between">
    <div class="header-title-wrapper">
      <h3 class="fw-bold mb-0">{{ headerTitle }}</h3>
    </div>
    <div class="feedback-buttons d-flex">
      <button
        type="button"
        class="feedback-button thumbs-up-button"
        (click)="onThumbsUp()"
        aria-label="Thumbs up">
        <span class="icon-thumbs-up"></span>
      </button>
      <button
        type="button"
        class="feedback-button thumbs-down-button"
        (click)="onThumbsDown()"
        aria-label="Thumbs down">
        <span class="icon-thumbs-down"></span>
      </button>
    </div>
  </div>

  <!-- Card Body: design system component with grid layout for rule items -->
  <div class="card-body">
    <div class="rule-item d-flex flex-column" *ngFor="let rule of ruleItems">
      <h4 class="rule-title fw-bold mb-0">{{ rule.title }}</h4>
      <p class="rule-description text-muted mb-0">{{ rule.description }}</p>
    </div>
  </div>
</div>
