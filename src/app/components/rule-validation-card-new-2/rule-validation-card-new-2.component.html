<!-- Rule Validation Card -->
<div class="card">
  <!-- Card Header -->
  <div class="card-header d-flex align-items-center">
    <!-- Header Title Wrapper -->
    <div class="header-title-wrapper">
      <h3 class="fw-bold mb-0">{{ headerTitle }}</h3>
    </div>

    <!-- Feedback Buttons -->
    <div class="feedback-buttons d-flex" *ngIf="showFeedback">
      <button
        type="button"
        class="btn-icon-feedback"
        (click)="onLike()"
        aria-label="Like">
        <span class="icon-thumbs-up"></span>
      </button>
      <button
        type="button"
        class="btn-icon-feedback"
        (click)="onDislike()"
        aria-label="Dislike">
        <span class="icon-thumbs-down"></span>
      </button>
    </div>
  </div>

  <!-- Card Body -->
  <div class="card-body">
    <!-- Rule Items -->
    <div class="rule-item" *ngFor="let rule of rules">
      <div class="rule-content d-flex flex-column">
        <div class="rule-title fw-bold">{{ rule.title }}</div>
        <div class="rule-description">{{ rule.description }}</div>
      </div>
    </div>
  </div>
</div>
