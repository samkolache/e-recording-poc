<!-- Rule Validation Card -->
<div class="card rule-validation-card rounded-0 shadow-none w-100">
  <!-- Card Header -->
  <div class="card-header d-flex align-items-center justify-content-between">
    <div class="header-title-wrapper">
      <h3 class="fw-bold mb-0">{{ headerTitle }}</h3>
    </div>

    <!-- Feedback Buttons -->
    <div *ngIf="showFeedback" class="feedback-buttons d-flex gap-2">
      <button
        type="button"
        class="btn feedback-btn d-flex align-items-center justify-content-center"
        (click)="onLike()"
        aria-label="Like">
        <span class="icon-thumbs-up"></span>
      </button>
      <button
        type="button"
        class="btn feedback-btn d-flex align-items-center justify-content-center"
        (click)="onDislike()"
        aria-label="Dislike">
        <span class="icon-thumbs-down"></span>
      </button>
    </div>
  </div>

  <!-- Card Body -->
  <div class="card-body" role="list">
    <!-- Rule Items -->
    <div
      *ngFor="let rule of rules; let last = last"
      class="rule-item bg-white"
      [class.rule-item-last]="last"
      role="listitem">
      <div class="rule-content d-flex flex-column">
        <div class="rule-title fw-bold">{{ rule.title }}</div>
        <div class="rule-description">{{ rule.description }}</div>
      </div>
    </div>
  </div>
</div>
