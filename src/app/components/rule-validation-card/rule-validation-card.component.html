<!-- Rule Validation Card -->
<div class="card rule-validation-card">
  <!-- Card Header -->
  <div class="card-header d-flex align-items-center">
    <!-- Header Content Wrapper with flex-grow -->
    <div class="header-content-wrapper flex-grow-1 ps-3">
      <h3 class="fw-bold mb-0 card-title">{{ cardTitle }}</h3>
    </div>

    <!-- Feedback Buttons -->
    <div class="feedback-buttons d-flex">
      <button
        type="button"
        class="btn-icon-feedback"
        aria-label="Like"
        (click)="onThumbsUp()">
        <span class="icon-thumbs-up"></span>
      </button>
      <button
        type="button"
        class="btn-icon-feedback"
        aria-label="Dislike"
        (click)="onThumbsDown()">
        <span class="icon-thumbs-down"></span>
      </button>
    </div>
  </div>

  <!-- Card Body -->
  <div class="card-body">
    <!-- Rule Items List -->
    <div class="rule-item" *ngFor="let rule of rules">
      <div class="rule-title fw-bold">{{ rule.title }}</div>
      <div class="rule-description">{{ rule.description }}</div>
    </div>
  </div>
</div>
